site_name: 机器人开发学习知识库
site_description: 机器人、编程、计算机基础、机器学习、MuJoCo与ROS 2学习记录
site_author: shenxin-cmd
site_url: https://shenxin-cmd.github.io/robot-learning-notes/

repo_name: shenxin-cmd/robot-learning-notes
repo_url: https://github.com/shenxin-cmd/robot-learning-notes
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到深色模式

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en
  - tags
  - blog

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md

  - 每周学习:
      - weekly/index.md
      - 第一周: weekly/week-01.md

  - 编程基础:
      - programming/index.md
      - Python: programming/python/index.md
      - C++: programming/cpp/index.md
      - Linux与Git: programming/tools/index.md

  - 计算机基础:
      - computer-science/index.md
      - 数据结构: computer-science/data-structure/index.md
      - 操作系统: computer-science/operating-system/index.md
      - 计算机网络: computer-science/network/index.md

  - 机器人学:
      - robotics/index.md
      - 坐标变换: robotics/transforms/index.md
      - 运动学: 
        - robotics/kinematics/index.md
        - Jacobian基础: robotics/kinematics/jacobian.md
      - 动力学: robotics/dynamics/index.md
      - 轨迹规划: robotics/trajectory/index.md
      - 控制: robotics/control/index.md

  - MuJoCo实验:
      - mujoco/index.md
      - 建模: mujoco/modeling/index.md
      - 位置控制: mujoco/position-control/index.md
      - 轨迹规划: mujoco/trajectory/index.md
      - 力控制: mujoco/force-control/index.md

  - ROS 2:
      - ros2/index.md

  - 机器学习:
      - machine-learning/index.md
      - 深度学习: machine-learning/deep-learning/index.md
      - 强化学习: machine-learning/reinforcement-learning/index.md

  - 项目:
      - projects/index.md
      - G1乒乓球: projects/g1-table-tennis/index.md

  - 调试记录:
      - debugging/index.md

  - 博客:
      - blog/index.md

  - 标签: tags.md

  - 测试: test.md