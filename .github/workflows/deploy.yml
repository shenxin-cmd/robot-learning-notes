name: Deploy MkDocs site

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install MkDocs
        run: |
          pip install mkdocs-material


      - name: Deploy
        run: |
          mkdocs gh-deploy --force